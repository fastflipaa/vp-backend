name: Test and Deploy

# CI deploy gate for vp-backend.
#
# Runs the full test suite on every push to main. ONLY if all tests pass
# does the workflow SSH into the production VPS and trigger Coolify to
# deploy vp-api and vp-worker. A failed test run blocks the deploy
# entirely -- preventing the kind of "broken commit ships to prod" outage
# that took the system down for 46 hours on 2026-04-05.
#
# REQUIRED REPO SECRETS (one-time setup -- see .github/CI_SETUP.md):
#   - VPS_SSH_KEY  : the private key matching ~/.ssh/vps_key on operator's machine
#                    (the same key already used by Paramiko in Python agents)
#
# The deploy step calls /usr/local/bin/coolify-deploy on the VPS, which is
# a thin wrapper around a PHP script inside the coolify container that
# uses Coolify's queue_application_deployment() helper.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual re-runs from the Actions tab

concurrency:
  # Cancel any in-progress run for the same branch when a new commit lands.
  # The latest commit always wins; intermediate commits are skipped.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run fast unit tests (no testcontainers)
        run: |
          # Fast feedback path: every test EXCEPT the ones marked `slow`.
          # Slow tests (testcontainers-backed integration tests) run in a
          # separate job below so a flaky container doesn't block deploy.
          pytest tests/ -m "not slow" --tb=short -q

      - name: State machine smoke test
        # Belt-and-suspenders for the failure mode that caused the Apr 5
        # outage: ConversationSM raising InvalidDefinition on instantiation.
        # The full test suite ALSO catches this via
        # tests/state_machine/test_conversation_sm.py, but this explicit
        # one-liner makes the regression unmissable in CI logs.
        run: |
          python -c "
          from app.state_machine.conversation_sm import ConversationSM
          for s in ('GREETING','QUALIFYING','SCHEDULING','QUALIFIED','NON_RESPONSIVE','RECOVERY','FOLLOW_UP','RE_ENGAGE','HANDOFF','CLOSED','BROKER'):
              ConversationSM.from_persisted_state(s, 'ci_smoke_test')
          print('SM smoke test passed for all 11 states')
          "

  integration-tests:
    name: pytest -m slow (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test  # only run if fast tests passed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run slow integration tests (testcontainers)
        # GitHub Actions runners have docker pre-installed -- testcontainers
        # spins up real Neo4j / Redis containers for these tests. If any of
        # these fail the deploy is blocked.
        run: pytest tests/ -m slow --tb=short -q
        env:
          # testcontainers needs to know docker is reachable
          DOCKER_HOST: unix:///var/run/docker.sock

  deploy:
    name: deploy to Coolify
    runs-on: ubuntu-latest
    needs: [test, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    concurrency:
      # Only one deploy at a time (across all triggers)
      group: vp-backend-deploy
      cancel-in-progress: false

    steps:
      - name: Configure SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 72.62.64.164 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Trigger Coolify deploy of vp-api
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
              root@72.62.64.164 \
              /usr/local/bin/coolify-deploy qok8cs0g4wgooks400cwoo4o

      - name: Trigger Coolify deploy of vp-worker
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
              root@72.62.64.164 \
              /usr/local/bin/coolify-deploy xk4o0g40o8cc848c40gg48ck

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key
