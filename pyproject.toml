[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "asyncio: mark test as async",
    "slow: marks tests requiring testcontainers (deselect with -m 'not slow')",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/__pycache__/*",
    "app/tasks/test_task.py",
    # Celery task wrappers: tested via constituent service/repo tests
    "app/tasks/processing_task.py",
    "app/tasks/gate_tasks.py",
    "app/tasks/scheduled/*.py",
    "app/tasks/alerting_tasks.py",
    "app/tasks/doc_delivery_task.py",
    "app/tasks/handoff_notification_task.py",
    "app/tasks/pipeline_sync_task.py",
    "app/tasks/pricing_alert_task.py",
    "app/tasks/reporting_tasks.py",
    # External API wrappers: require live services
    "app/services/ghl_service.py",
    "app/services/ghl_enrichment.py",
    "app/services/response_delivery.py",
    "app/services/human_reentry.py",
    "app/services/language_detector.py",
    # Operator module: new, not yet covered
    "app/services/operator/*.py",
    # Shadow mode: deprecated post-cutover
    "app/shadow/*.py",
    # Processors: require full pipeline integration (Claude, Neo4j, GHL)
    "app/processors/greeting.py",
    "app/processors/handoff.py",
    "app/processors/qualifying.py",
    "app/processors/scheduling.py",
    # Canary router: tested at integration level
    "app/services/canary_router.py",
    # API schemas: Pydantic models, no logic to test
    "app/api/schemas.py",
    # Repositories: tested via testcontainer (slow), excluded from fast-path coverage
    "app/repositories/learning_repository.py",
    "app/repositories/lead_repository.py",
    "app/repositories/building_repository.py",
    "app/repositories/conversation_repository.py",
    "app/repositories/base.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
